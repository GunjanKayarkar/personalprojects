<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Survey Form</title>
</head>
<body>
<header class="header">
    <h1 id="title">freeCodeCamp Survey Form</h1>

    <p id="description">Thank you for taking the time to help us improve the platform</p>
</header>


    <form id="survey-form">

        <label id="name-label" for="name">Name:</label><br>
        <input type="text" id="name" name="name" placeholder="Enter your name" required><br>
        <label id="email-label" for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email" required><br>
        <label id="number-label" for="number">Age:</label><br>
        <input type="number" id="number" name="age" placeholder="Enter your age" min="13" max="99" placeholder="Age" >
        
        <p>Which option best describes your current role?</p>
        <select id="dropdown" name="role" required>
          <option disabled selected value>Select current role</option>
          <option value="student">Student</option>
          <option value="job">Full Time Job</option>
          <option value="learner">Full Time Learner</option>
          <option value="preferNo">Prefer not to say</option>
          <option value="other">Other</option>
        </select>
        <br>

        <input type="radio" id="html" name="fav_language" value="HTML">
<label for="html">HTML</label><br>
<input type="radio" id="css" name="fav_language" value="CSS">
<label for="css">CSS</label><br>
<input type="radio" id="javascript" name="fav_language" value="JavaScript">
<label for="javascript">JavaScript</label>
<br>

<label><input name="prefer" value="front-end-projects" type="checkbox" class="input-checkbox"/>Front-end Projects</label>
<label>
<input
  name="prefer"
  value="back-end-projects"
  type="checkbox"
  class="input-checkbox"
/>Back-end Projects</label
>
<label
><input
  name="prefer"
  value="data-visualization"
  type="checkbox"
  class="input-checkbox"
/>Data Visualization</label
>
<label
><input
  name="prefer"
  value="challenges"
  type="checkbox"
  class="input-checkbox"
/>Challenges</label
>
<label
><input
  name="prefer"
  value="open-source-community"
  type="checkbox"
  class="input-checkbox"
/>Open Source Community</label
>
<label
><input
  name="prefer"
  value="gitter-help-rooms"
  type="checkbox"
  class="input-checkbox"
/>Gitter help rooms</label
>
<label
><input
  name="prefer"
  value="videos"
  type="checkbox"
  class="input-checkbox"
/>Videos</label
>
<label
><input
  name="prefer"
  value="city-meetups"
  type="checkbox"
  class="input-checkbox"
/>City Meetups</label
>
<label
><input
  name="prefer"
  value="wiki"
  type="checkbox"
  class="input-checkbox"
/>Wiki</label
>
<label
><input
  name="prefer"
  value="forum"
  type="checkbox"
  class="input-checkbox"
/>Forum</label
>
<label
><input
  name="prefer"
  value="additional-courses"
  type="checkbox"
  class="input-checkbox"
/>Additional Courses</label
>



        <p>Any comments or suggestions?</p>
        <textarea id="comments" class="input-textarea" name="comment" placeholder="Enter your comments here" ></textarea>
        <button type="submit" id="submit" class="submit-button">Submit</button>
    </form>


    
</body>
</html>
